---
- name: Configure kernel hot patching on RHEL 9
  hosts: rhel9_hosts
  become: yes
  tasks:
    - name: Install kpatch and kpatch-dnf
      dnf:
        name:
          - kpatch
          - kpatch-dnf
        state: present

    - name: Enable kpatch-dnf plugin for automatic kernel patches
      command: dnf kpatch auto
      register: kpatch_auto
      changed_when: "'already enabled' not in kpatch_auto.stdout"
      failed_when: false

    - name: Check for available kpatch modules
      command: kpatch list
      register: kpatch_list
      changed_when: false

    - name: Install available kpatch modules
      dnf:
        name: "kpatch-patch-*"
        state: latest
      register: kpatch_install

    - name: Load all installed kpatch modules
      command: kpatch load --all
      when: kpatch_install.changed

    - name: Verify loaded kpatch modules
      command: kpatch list
      register: kpatch_status
      changed_when: false

    - name: Display kpatch status
      debug:
        var: kpatch_status.stdout_lines
